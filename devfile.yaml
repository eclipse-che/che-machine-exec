schemaVersion: 2.3.0

metadata:
  name: che-machine-exec

components:

  - container:
      endpoints:
        - name: cloud-shell
          targetPort: 3130
          exposure: public
          protocol: http
        - exposure: none
          name: debug
          targetPort: 5858
        - name: exec-server
          targetPort: 5555
          exposure: public
          attributes:
            type: terminal-dev
            protocol: ws
            secure: false
      image: registry.access.redhat.com/ubi9/go-toolset:1.25.5-1770596585
      args:
        - tail
        - '-f'
        - /dev/null
      env:
        - name: DEBUG_PORT
          value: '5858'
        - name: GOPATH
          value: $(PROJECTS_ROOT)/.go
        - name: GOMODCACHE
          value: /var/tmp/.go/pkg/mod
        - name: GOCACHE
          value: /var/tmp/.go/build
        - name: XDG_CACHE_HOME
          value: /var/tmp/.go/xdg
      memoryLimit: 2.5Gi
      mountSources: true
    name: dev

  - name: node
    container:
      image: docker.io/node:22-alpine
      args:
        - tail
        - '-f'
        - /dev/null
      mountSources: true
      memoryLimit: 1.5Gi

commands:
  - id: compile
    exec:
      component: dev
      commandLine: ./compile.sh
      workingDir: /projects/che-machine-exec
      group:
        kind: build
        isDefault: true

  - id: format
    exec:
      component: dev
      commandLine: go fmt ./... && printf "\033[32mDone.\033[0m"
      workingDir: /projects/che-machine-exec
      group:
        kind: build
        isDefault: false

  - id: test
    exec:
      component: dev
      commandLine: export CHE_WORKSPACE_ID=test_id; go test ./...
      workingDir: /projects/che-machine-exec
      group:
        kind: test
        isDefault: true

  - id: start-exec-server
    exec:
      component: dev
      commandLine: ./che-machine-exec --url 0.0.0.0:5555
      workingDir: /projects/che-machine-exec
      group:
        kind: run
        isDefault: true

  - id: stop-exec-server
    exec:
      component: dev
      commandLine: >-
        pid=$(pidof che-machine-exec) && kill ${pid} &&
        printf "\033[32mDone.\033[0m" ||
        printf "\033[32mNothing to stop... Done.\033[0m"
      group:
        kind: run
        isDefault: false

  - id: build-cloud-shell
    exec:
      component: node
      commandLine: >-
        export HOME=/projects &&
        export GOPATH=/projects/.go &&
        export GOMODCACHE=/var/tmp/.go/pkg/mod &&
        export GOCACHE=/var/tmp/.go/build &&
        export XDG_CACHE_HOME=/var/tmp/.go/xdg &&
        YARN_NETWORK_CONCURRENCY=1 corepack yarn install --immutable &&
        corepack yarn run build
      workingDir: /projects/che-machine-exec/cloud-shell
      group:
        kind: build
        isDefault: false

  - id: start-cloud-shell
    exec:
      component: dev
      commandLine: >-
        ./che-machine-exec --url 0.0.0.0:3130 --static /projects/che-machine-exec/cloud-shell
      workingDir: /projects/che-machine-exec
      group:
        kind: run
        isDefault: false
